<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Carrito - Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
      color: #333;
    }

    .header {
      max-width: 1000px;
      margin: 0 auto 2rem;
      text-align: center;
    }

    h2 {
      font-size: 2.5rem;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      margin-bottom: 0.5rem;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    button {
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .btn-success {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: white;
      font-size: 1.1rem;
      padding: 1rem 2rem;
    }

    .btn-danger {
      background: linear-gradient(135deg, #fa709a, #fee140);
      color: #333;
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
    }

    .cart-items {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .cart-item {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 1rem;
      align-items: center;
      transition: all 0.3s ease;
    }

    .cart-item:hover {
      transform: translateX(5px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    .item-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: #333;
    }

    .item-price {
      font-size: 1.1rem;
      color: #667eea;
      font-weight: 600;
    }

    .quantity-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #f5f7fa;
      border-radius: 10px;
      padding: 0.3rem;
    }

    .quantity-controls button {
      width: 35px;
      height: 35px;
      padding: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quantity-controls span {
      min-width: 40px;
      text-align: center;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .item-subtotal {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .total-section {
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      border-radius: 16px;
      padding: 2rem;
      margin: 2rem 0;
      text-align: right;
    }

    .total-section h3 {
      font-size: 2rem;
      color: #333;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 1rem;
    }

    .total-price {
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2.5rem;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 2rem;
    }

    #empty-cart {
      text-align: center;
      padding: 4rem 2rem;
    }

    #empty-cart p {
      font-size: 1.5rem;
      color: #999;
      margin-bottom: 2rem;
    }

    @media (max-width: 768px) {
      .cart-item {
        grid-template-columns: 1fr;
        text-align: center;
      }
      
      .actions {
        flex-direction: column;
      }
      
      h2 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  
  <div class="header">
    <h2>🛒 Mi Carrito</h2>
  </div>

  <div class="container">
    <div id="empty-cart" style="display: none;">
      <p>🛍️ Tu carrito está vacío</p>
      <button class="btn-primary" onclick="goToProducts()">Ver Productos</button>
    </div>

    <div id="cart-content">
      <div class="cart-items" id="cart-items"></div>

      <div class="total-section">
        <h3>
          <span>Total:</span>
          <span class="total-price" id="total-price">0.00 €</span>
        </h3>
      </div>

      <div class="actions">
        <button class="btn-primary" onclick="goBack()">← Seguir Comprando</button>
        <button class="btn-success" onclick="checkout()">✓ Finalizar Compra</button>
      </div>
    </div>
  </div>

  <script>
    const token = sessionStorage.getItem('token');
    if (!token) {
      alert('Debes iniciar sesión primero.');
      window.location.href = '/';
    }

    let cart = [];

    async function loadCart() {
      try {
        const res = await fetch('/api/cart', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        const data = await res.json();
        cart = data.cart || [];

        if (cart.length === 0) {
          document.getElementById('cart-content').style.display = 'none';
          document.getElementById('empty-cart').style.display = 'block';
          return;
        }

        document.getElementById('cart-content').style.display = 'block';
        document.getElementById('empty-cart').style.display = 'none';

        renderCart(data.cart, data.total);
      } catch (err) {
        console.error(err);
        alert('Error al cargar el carrito');
      }
    }

    function renderCart(cartItems, total) {
      const container = document.getElementById('cart-items');
      container.innerHTML = '';

      cartItems.forEach(item => {
        const div = document.createElement('div');
        div.className = 'cart-item';
        
        div.innerHTML = `
          <div class="item-name">${item.product.name}</div>
          <div class="item-price">${item.product.price.toFixed(2)} €</div>
          <div class="quantity-controls">
            <button onclick="updateQuantity('${item.product._id}', ${item.quantity - 1})">-</button>
            <span>${item.quantity}</span>
            <button onclick="updateQuantity('${item.product._id}', ${item.quantity + 1})">+</button>
          </div>
          <div class="item-subtotal">${item.subtotal.toFixed(2)} €</div>
          <button class="btn-danger" onclick="removeFromCart('${item.product._id}')">🗑️</button>
        `;
        container.appendChild(div);
      });

      document.getElementById('total-price').textContent = total.toFixed(2) + ' €';
    }

    async function updateQuantity(productId, newQuantity) {
      if (newQuantity < 1) return;

      try {
        const res = await fetch('/api/cart/update', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ productId, quantity: newQuantity })
        });

        if (res.ok) {
          loadCart();
        } else {
          alert('Error al actualizar cantidad');
        }
      } catch (err) {
        console.error(err);
        alert('Error al actualizar cantidad');
      }
    }

    async function removeFromCart(productId) {
      if (!confirm('¿Eliminar este producto del carrito?')) return;

      try {
        const res = await fetch(`/api/cart/remove/${productId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.ok) {
          loadCart();
        } else {
          alert('Error al eliminar producto');
        }
      } catch (err) {
        console.error(err);
        alert('Error al eliminar producto');
      }
    }

    async function checkout() {
      if (cart.length === 0) {
        alert('El carrito está vacío');
        return;
      }

      if (!confirm('¿Confirmar compra?')) return;

      try {
        const products = cart.map(item => ({
          productId: item.product._id,
          quantity: item.quantity
        }));

        const query = `
          mutation CreateOrder($products: [OrderProductInput!]!) {
            createOrder(products: $products) {
              id
              total
              status
              createdAt
            }
          }
        `;

        const res = await fetch('/graphql', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            query,
            variables: { products }
          })
        });

        const result = await res.json();

        if (result.errors) {
          alert('Error al crear pedido: ' + result.errors[0].message);
          return;
        }

        await fetch('/api/cart/clear', {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        alert('✅ ¡Pedido realizado con éxito!');
        window.location.href = '/my_orders.html';
      } catch (err) {
        console.error(err);
        alert('Error al procesar la compra');
      }
    }

    function goBack() {
      window.location.href = '/products.html';
    }

    function goToProducts() {
      window.location.href = '/products.html';
    }

    loadCart();
  </script>
</body>
</html>
