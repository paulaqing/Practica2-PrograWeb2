<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
      color: #333;
    }

    .header {
      max-width: 1400px;
      margin: 0 auto 2rem;
      text-align: center;
    }

    h2 {
      font-size: 2.5rem;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 2rem;
      min-height: 600px;
    }

    .users-list {
      border-right: 2px solid #e0e0e0;
      padding-right: 1rem;
    }

    .users-list h3 {
      margin-bottom: 1rem;
      color: #667eea;
      font-size: 1.2rem;
    }

    .user-item {
      padding: 1rem;
      background: white;
      border-radius: 12px;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .user-item:hover {
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      transform: translateX(5px);
    }

    .user-item.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-color: #667eea;
    }

    .user-badge {
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(102, 126, 234, 0.2);
    }

    .user-item.active .user-badge {
      background: rgba(255, 255, 255, 0.3);
    }

    .section-header {
      font-weight: 600;
      color: #667eea;
      margin: 1rem 0 0.5rem;
      font-size: 0.9rem;
      padding: 0.5rem;
      background: linear-gradient(135deg, #f5f7fa, #e0e0e0);
      border-radius: 8px;
    }

    .chat-area {
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 1rem 1.5rem;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      border-radius: 12px;
      margin-bottom: 1rem;
      font-weight: 700;
      font-size: 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #messages {
      flex: 1;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border-radius: 12px;
      padding: 1rem;
      max-height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .user-msg, .other-msg {
      padding: 0.8rem 1.2rem;
      border-radius: 18px;
      max-width: 75%;
      word-wrap: break-word;
      animation: messageSlide 0.3s ease;
    }

    @keyframes messageSlide {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user-msg {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .other-msg {
      background: white;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .msg-name {
      font-weight: 700;
      display: block;
      margin-bottom: 0.3rem;
      font-size: 0.85rem;
      opacity: 0.9;
    }

    .msg-time {
      display: block;
      font-size: 0.7rem;
      opacity: 0.6;
      text-align: right;
      margin-top: 0.3rem;
    }

    #form {
      display: flex;
      gap: 0.5rem;
    }

    input {
      flex: 1;
      padding: 1rem;
      border-radius: 12px;
      border: 2px solid #e0e0e0;
      font-size: 1rem;
      transition: all 0.3s ease;
      background: white;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      padding: 1rem 2rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .btn-back {
      margin-top: 1rem;
      width: auto;
    }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: #999;
      font-size: 0.95rem;
    }

    .welcome-message {
      text-align: center;
      padding: 3rem;
      color: #999;
    }

    .welcome-message h3 {
      color: #667eea;
      margin-bottom: 1rem;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 10px;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }

      .users-list {
        border-right: none;
        border-bottom: 2px solid #e0e0e0;
        padding-bottom: 1rem;
        margin-bottom: 1rem;
      }
    }
  </style>
</head>
<body>
  
  <div class="header">
    <h2>💬 Chat</h2>
  </div>

  <div class="container">
    <div class="users-list">
      <h3 id="users-title">👥 Usuarios</h3>
      <div id="users-container">
        <div class="empty-state">Cargando...</div>
      </div>
    </div>

    <div class="chat-area">
      <div class="chat-header" id="chat-header">
        <span>Selecciona un usuario para comenzar</span>
      </div>
      <ul id="messages">
        <div class="welcome-message">
          <h3>👋 ¡Bienvenido al Chat!</h3>
          <p>Selecciona un usuario de la lista para comenzar a conversar</p>
        </div>
      </ul>
      <form id="form">
        <input id="input" autocomplete="off" placeholder="Escribe un mensaje..." disabled />
        <button type="submit" disabled>Enviar</button>
      </form>
    </div>
  </div>

  <button class="btn-back" onclick="goBack()">← Volver al Inicio</button>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const token = sessionStorage.getItem('token');
    if (!token) {
      alert('Debes iniciar sesión primero.');
      window.location.href = '/';
    }

    const payload = JSON.parse(atob(token.split('.')[1]));
    const currentUsername = payload.username;
    const isAdmin = payload.role === 'admin';

    const socket = io({ auth: { token } });
    let currentChatUser = null;

    const messages = document.getElementById('messages');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const chatHeader = document.getElementById('chat-header');
    const usersContainer = document.getElementById('users-container');
    const usersTitle = document.getElementById('users-title');

    // Actualizar título según rol
    usersTitle.textContent = '👥 Usuarios Disponibles';

    socket.on('connect', () => {
      console.log('✅ Conectado al servidor de chat');
      socket.emit('getAvailableUsers');
    });

    socket.on('availableUsers', (users) => {
      usersContainer.innerHTML = '';

      if (users.length === 0) {
        usersContainer.innerHTML = '<div class="empty-state">No hay usuarios disponibles</div>';
        return;
      }

      // Separar por rol
      const admins = users.filter(u => u.role === 'admin');
      const regularUsers = users.filter(u => u.role === 'user');

      // Mostrar admins primero
      if (admins.length > 0) {
        const adminHeader = document.createElement('div');
        adminHeader.className = 'section-header';
        adminHeader.textContent = '👔 Administradores';
        usersContainer.appendChild(adminHeader);

        admins.forEach(user => {
          const div = document.createElement('div');
          div.className = 'user-item';
          div.innerHTML = `
            <span>👔 ${user.username}</span>
            <span class="user-badge">Admin</span>
          `;
          div.onclick = () => selectUser(user.username);
          usersContainer.appendChild(div);
        });
      }

      // Mostrar usuarios normales
      if (regularUsers.length > 0) {
        const userHeader = document.createElement('div');
        userHeader.className = 'section-header';
        userHeader.textContent = '👤 Usuarios';
        usersContainer.appendChild(userHeader);

        regularUsers.forEach(user => {
          const div = document.createElement('div');
          div.className = 'user-item';
          div.innerHTML = `
            <span>👤 ${user.username}</span>
            <span class="user-badge">User</span>
          `;
          div.onclick = () => selectUser(user.username);
          usersContainer.appendChild(div);
        });
      }
    });

    function selectUser(username) {
      currentChatUser = username;
      
      // Buscar el rol del usuario seleccionado
      const userElement = Array.from(document.querySelectorAll('.user-item'))
        .find(el => el.textContent.includes(username));
      const isTargetAdmin = userElement?.textContent.includes('Admin');
      const roleIcon = isTargetAdmin ? '👔' : '👤';
      
      chatHeader.innerHTML = `<span>${roleIcon} Chat con ${username}</span>`;
      
      // Activar inputs
      input.disabled = false;
      form.querySelector('button').disabled = false;
      
      // Marcar como activo
      document.querySelectorAll('.user-item').forEach(item => {
        item.classList.remove('active');
        if (item.textContent.includes(username)) {
          item.classList.add('active');
        }
      });

      // Determinar sala (ordenar alfabéticamente para consistencia)
      const users = [currentUsername, username].sort();
      const room = `chat-${users[0]}-${users[1]}`;
      
      socket.currentRoom = room;
      socket.emit('joinRoom', room);
    }

    socket.on('messageHistory', (history) => {
      messages.innerHTML = '';
      if (history.length === 0) {
        messages.innerHTML = `
          <div class="welcome-message">
            <h3>👋 Inicia la conversación</h3>
            <p>Escribe el primer mensaje</p>
          </div>
        `;
        return;
      }
      history.forEach(m => appendMessage(m.name, m.msg, m.timestamp));
    });

    socket.on('chatmessage', (data) => {
      // Solo mostrar si estamos en esa sala
      if (messages.querySelector('.welcome-message')) {
        messages.innerHTML = '';
      }
      appendMessage(data.name, data.msg, data.timestamp);
    });

    form.onsubmit = (e) => {
      e.preventDefault();
      if (input.value.trim() && currentChatUser) {
        socket.emit('chatmessage', { 
          message: input.value.trim(),
          room: socket.currentRoom
        });
        input.value = '';
      }
    };

    function appendMessage(name, msg, time) {
      const li = document.createElement('li');
      li.className = (name === currentUsername) ? 'user-msg' : 'other-msg';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'msg-name';
      nameSpan.textContent = name;
      li.appendChild(nameSpan);

      const msgSpan = document.createElement('span');
      msgSpan.textContent = msg;
      li.appendChild(msgSpan);

      const timeSpan = document.createElement('span');
      timeSpan.className = 'msg-time';
      timeSpan.textContent = time;
      li.appendChild(timeSpan);

      messages.appendChild(li);
      messages.scrollTop = messages.scrollHeight;
    }

    function goBack() {
      window.location.href = '/';
    }
  </script>
</body>
</html>
