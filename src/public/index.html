<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Productos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .container {
      width: 90%;
      max-width: 450px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 3rem 2.5rem;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 2rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome-text {
      text-align: center;
      margin-bottom: 2rem;
      font-size: 1.1rem;
      color: #555;
    }

    .user-badge {
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
      margin-left: 0.5rem;
    }

    input, button {
      width: 100%;
      padding: 1rem;
      margin: 0.75rem 0;
      border-radius: 12px;
      border: 2px solid #e0e0e0;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    input {
      background: #f8f9fa;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #f093fb, #f5576c);
    }

    .btn-secondary:hover {
      box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);
    }

    .btn-cart {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .btn-orders {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
    }

    .btn-admin {
      background: linear-gradient(135deg, #fa709a, #fee140);
      color: #333;
    }

    .btn-logout {
      background: linear-gradient(135deg, #30cfd0, #330867);
      margin-top: 1rem;
    }

    .button-grid {
      display: grid;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    #auth-section, #inicio-section, #chat-section {
      display: none;
    }

    /* Chat moderno */
    #messages {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border-radius: 12px;
      padding: 1rem;
      max-height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .user-msg, .other-msg {
      padding: 0.8rem 1.2rem;
      border-radius: 18px;
      max-width: 75%;
      word-wrap: break-word;
      animation: messageSlide 0.3s ease;
    }

    @keyframes messageSlide {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user-msg {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .other-msg {
      background: white;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .msg-name {
      font-weight: 700;
      display: block;
      margin-bottom: 0.3rem;
      font-size: 0.85rem;
      opacity: 0.9;
    }

    .msg-time {
      display: block;
      font-size: 0.7rem;
      opacity: 0.6;
      text-align: right;
      margin-top: 0.3rem;
    }

    #form {
      display: flex;
      gap: 0.5rem;
    }

    #input {
      flex: 1;
      margin: 0;
    }

    #form button {
      width: auto;
      padding: 1rem 2rem;
      margin: 0;
    }

    /* Scrollbar personalizado */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #764ba2;
    }

    .icon {
      margin-right: 0.5rem;
    }
  </style>
</head>
<body>

  <!-- 🔐 Autenticación -->
  <div id="auth-section" class="container">
    <h2>✨ Bienvenido</h2>
    <input id="username" placeholder="Usuario" required>
    <input id="password" type="password" placeholder="Contraseña" required>
    <button onclick="login()">Iniciar Sesión</button>
    <button class="btn-secondary" onclick="register()">Registrarse</button>
  </div>

  <!-- 🏠 Inicio -->
  <div id="inicio-section" class="container">
    <h2>🏠 Inicio</h2>
    <p class="welcome-text">
      Hola, <strong><span id="user-name"></span></strong>
      <span class="user-badge"><span id="user-role"></span></span>
    </p>
    <div class="button-grid">
      <button onclick="goToProducts()"><span class="icon">🛍️</span>Ver Productos</button>
      <button class="btn-cart" id="cart-btn" onclick="goToCart()"><span class="icon">🛒</span>Mi Carrito</button>
      <button class="btn-orders" id="orders-btn" onclick="goToMyOrders()"><span class="icon">📦</span>Mis Pedidos</button>
      <button onclick="goToChat()"><span class="icon">💬</span>Chat</button>
      <button class="btn-admin" id="admin-btn" style="display: none;" onclick="goToAdmin()">
        <span class="icon">⚙️</span>Panel de Admin
      </button>
      <button class="btn-logout" onclick="logout()"><span class="icon">🚪</span>Cerrar Sesión</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const authSection = document.getElementById('auth-section');
    const inicioSection = document.getElementById('inicio-section');
    const userNameSpan = document.getElementById('user-name');
    const userRoleSpan = document.getElementById('user-role');

    function register() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      if (!username || !password) {
        alert('Por favor completa todos los campos');
        return;
      }

      fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      .then(r => r.json())
      .then(data => {
        alert(data.message);
        if (data.message.includes('correctamente')) {
          document.getElementById('username').value = '';
          document.getElementById('password').value = '';
        }
      })
      .catch(() => alert('Error al registrar'));
    }

    function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      if (!username || !password) {
        alert('Por favor completa todos los campos');
        return;
      }

      fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      .then(r => r.json())
      .then(data => {
        if (data.token) {
          sessionStorage.setItem('token', data.token);
          showInicio(data.token);
        } else {
          alert('Usuario o contraseña incorrectos');
        }
      })
      .catch(() => alert('Error al iniciar sesión'));
    }

    function decodeToken(token) {
      return JSON.parse(atob(token.split('.')[1]));
    }

    function showInicio(token) {
      authSection.style.display = 'none';
      inicioSection.style.display = 'block';
      
      const payload = decodeToken(token);
      userNameSpan.textContent = payload.username;
      userRoleSpan.textContent = payload.role === 'admin' ? 'Admin' : 'Usuario';
      
      if (payload.role === 'admin') {
        document.getElementById('admin-btn').style.display = 'block';
        // Ocultar carrito y pedidos para admin
        document.getElementById('cart-btn').style.display = 'none';
        document.getElementById('orders-btn').style.display = 'none';
      } else {
        document.getElementById('admin-btn').style.display = 'none';
        document.getElementById('cart-btn').style.display = 'block';
        document.getElementById('orders-btn').style.display = 'block';
      }
    }

    function goToChat() {
      window.location.href = '/chat.html';
    }

    function connectToChat() {
      // Función eliminada - ahora se usa chat.html
    }

    function backToInicio() {
      // Función eliminada - ahora se usa chat.html
    }

    function goToProducts() { window.location.href = '/products.html'; }
    function goToCart() { window.location.href = '/cart.html'; }
    function goToMyOrders() { window.location.href = '/my_orders.html'; }
    function goToAdmin() { window.location.href = '/admin.html'; }

    function logout() {
      sessionStorage.removeItem('token');
      authSection.style.display = 'block';
      inicioSection.style.display = 'none';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    window.addEventListener('load', () => {
      const token = sessionStorage.getItem('token');
      if (token) {
        try {
          showInicio(token);
        } catch (e) {
          logout();
        }
      } else {
        authSection.style.display = 'block';
      }
    });
  </script>
</body>
</html>
