<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
      color: #333;
    }

    .header {
      max-width: 1200px;
      margin: 0 auto 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    h2 {
      font-size: 2.5rem;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .header-buttons {
      display: flex;
      gap: 1rem;
    }

    button {
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .btn-primary {
      background: white;
      color: #667eea;
    }

    .btn-cart {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: white;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    #product-form {
      display: none;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    #product-form h3 {
      margin-bottom: 1rem;
      color: #667eea;
    }

    input, textarea {
      width: 100%;
      padding: 0.9rem;
      margin: 0.5rem 0;
      border-radius: 10px;
      border: 2px solid #e0e0e0;
      font-size: 1rem;
      transition: all 0.3s ease;
      background: white;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .product-card {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      border: 2px solid transparent;
      display: flex;
      flex-direction: column;
    }

    .product-image {
      width: 100%;
      height: 200px;
      object-fit: contain;
      border-radius: 12px;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      padding: 0.5rem;
    }

    .product-no-image {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      border-radius: 12px;
      margin-bottom: 1rem;
      font-size: 3rem;
      color: #999;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      border-color: #667eea;
    }

    .product-name {
      font-size: 1.4rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 0.5rem;
    }

    .product-description {
      color: #666;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .product-price {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    .product-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .btn-add {
      flex: 1;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 0.8rem;
    }

    .btn-edit {
      flex: 1;
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: white;
      padding: 0.8rem;
    }

    .btn-delete {
      flex: 1;
      background: linear-gradient(135deg, #fa709a, #fee140);
      color: #333;
      padding: 0.8rem;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #999;
    }

    .empty-state p {
      font-size: 1.3rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 768px) {
      .products-grid {
        grid-template-columns: 1fr;
      }
      
      h2 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  
  <div class="header">
    <h2>🛍️ Productos</h2>
    <div class="header-buttons">
      <button class="btn-cart" id="cart-btn-header" onclick="goToCart()">🛒 Carrito</button>
      <button class="btn-primary" onclick="goBack()">← Volver</button>
    </div>
  </div>

  <div class="container">
    <form id="product-form">
      <h3>✨ Agregar Producto</h3>
      <input type="text" id="name" placeholder="Nombre del producto" required>
      <textarea id="description" placeholder="Descripción del producto" required></textarea>
      <input type="number" id="price" placeholder="Precio (€)" step="0.01" required>
      <input type="file" id="image" accept="image/*">
      <button type="submit" id="submitBtn" class="btn-add">Agregar Producto</button>
    </form>

    <div class="products-grid" id="product-list"></div>
    
    <div class="empty-state" id="empty-state" style="display: none;">
      <p>📦 No hay productos disponibles</p>
    </div>
  </div>

  <script>
    const token = sessionStorage.getItem('token');
    if (!token) {
      alert('Debes iniciar sesión primero.');
      window.location.href = '/';
    }

    const payload = JSON.parse(atob(token.split('.')[1]));
    const isAdmin = payload.role === 'admin';

    const form = document.getElementById('product-form');
    const productList = document.getElementById('product-list');
    const submitBtn = document.getElementById('submitBtn');
    const emptyState = document.getElementById('empty-state');

    let editId = null;

    if (isAdmin) {
      form.style.display = 'block';
      // Ocultar botón del carrito para admin
      document.getElementById('cart-btn-header').style.display = 'none';
    }

    async function loadProducts() {
      const res = await fetch('/api/products', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const products = await res.json();

      productList.innerHTML = '';

      if (products.length === 0) {
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      products.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        
        const imageHTML = p.image 
          ? `<img src="${p.image}" alt="${p.name}" class="product-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
             <div class="product-no-image" style="display:none;">📦</div>`
          : `<div class="product-no-image">📦</div>`;
        
        card.innerHTML = `
          ${imageHTML}
          <div class="product-name">${p.name}</div>
          <div class="product-description">${p.description}</div>
          <div class="product-price">${p.price.toFixed(2)} €</div>
          <div class="product-actions">
            ${!isAdmin ? `
              <button class="btn-add" onclick="addToCart('${p._id}')">🛒 Añadir al Carrito</button>
            ` : `
              <button class="btn-edit" onclick="editProduct('${p._id}', \`${p.name}\`, \`${p.description}\`, ${p.price})">✏️ Editar</button>
              <button class="btn-delete" onclick="deleteProduct('${p._id}')">🗑️ Eliminar</button>
            `}
          </div>
        `;
        productList.appendChild(card);
      });
    }

    loadProducts();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const description = document.getElementById('description').value;
      const price = parseFloat(document.getElementById('price').value);
      const imageFile = document.getElementById('image').files[0];

      const method = editId ? 'PUT' : 'POST';
      const url = editId ? `/api/products/${editId}` : '/api/products';

      // Usar FormData para enviar archivos
      const formData = new FormData();
      formData.append('name', name);
      formData.append('description', description);
      formData.append('price', price);
      if (imageFile) {
        formData.append('image', imageFile);
      }

      const res = await fetch(url, {
        method,
        headers: {
          'Authorization': `Bearer ${token}`
          // No incluir Content-Type, el navegador lo configura automáticamente con FormData
        },
        body: formData
      });

      if (res.ok) {
        alert(editId ? '✅ Producto actualizado' : '✅ Producto agregado');
        form.reset();
        submitBtn.textContent = 'Agregar Producto';
        editId = null;
        loadProducts();
      } else {
        alert('❌ Error al guardar el producto');
      }
    });

    function editProduct(id, name, description, price) {
      document.getElementById('name').value = name;
      document.getElementById('description').value = description;
      document.getElementById('price').value = price;
      editId = id;
      submitBtn.textContent = 'Guardar Cambios';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteProduct(id) {
      if (!confirm('¿Seguro que deseas eliminar este producto?')) return;
      const res = await fetch(`/api/products/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.ok) {
        alert('✅ Producto eliminado');
        loadProducts();
      } else {
        alert('❌ Error al eliminar producto');
      }
    }

    async function addToCart(productId) {
      const res = await fetch('/api/cart/add', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ productId, quantity: 1 })
      });

      if (res.ok) {
        alert('✅ Producto añadido al carrito');
      } else {
        alert('❌ Error al añadir al carrito');
      }
    }

    function goBack() {
      window.location.href = '/';
    }

    function goToCart() {
      window.location.href = '/cart.html';
    }
  </script>
</body>
</html>
