<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Pedidos - Portal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem;
      color: #333;
    }

    .header {
      max-width: 1200px;
      margin: 0 auto 2rem;
      text-align: center;
    }

    h2 {
      font-size: 2.5rem;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
      margin-bottom: 0.5rem;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    button {
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .order-card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      border-left: 5px solid transparent;
    }

    .order-card:hover {
      transform: translateX(5px);
      box-shadow: 0 6px 25px rgba(0,0,0,0.15);
    }

    .order-card.pending {
      border-left-color: #f57c00;
    }

    .order-card.completed {
      border-left-color: #43e97b;
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #f0f0f0;
    }

    .order-id {
      font-weight: 700;
      font-size: 1.3rem;
      color: #333;
    }

    .order-status {
      padding: 0.5rem 1.2rem;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-pending {
      background: linear-gradient(135deg, #fa709a, #fee140);
      color: #333;
    }

    .status-completed {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: white;
    }

    .order-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .info-item {
      background: #f8f9fa;
      padding: 1rem;
      border-radius: 12px;
    }

    .info-label {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: #333;
    }

    .info-value.price {
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 1.5rem;
    }

    .order-products {
      margin-top: 1.5rem;
    }

    .order-products h4 {
      margin-bottom: 1rem;
      color: #667eea;
      font-size: 1.1rem;
    }

    .product-item {
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      padding: 1rem 1.5rem;
      border-radius: 12px;
      margin-bottom: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
    }

    .product-item:hover {
      transform: translateX(5px);
    }

    .product-name {
      font-weight: 600;
      color: #333;
    }

    .product-price {
      font-weight: 700;
      color: #667eea;
      font-size: 1.1rem;
    }

    #empty-orders {
      text-align: center;
      padding: 4rem 2rem;
    }

    #empty-orders p {
      font-size: 1.5rem;
      color: #999;
      margin-bottom: 2rem;
    }

    @media (max-width: 768px) {
      .order-header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }
      
      .order-info {
        grid-template-columns: 1fr;
      }
      
      h2 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  
  <div class="header">
    <h2>📦 Mis Pedidos</h2>
  </div>

  <div class="container">
    <div id="empty-orders" style="display: none;">
      <p>📭 No tienes pedidos aún</p>
      <button class="btn-primary" onclick="goToProducts()">Explorar Productos</button>
    </div>

    <div class="orders-list" id="orders-list"></div>

    <button class="btn-primary" onclick="goBack()" style="margin-top: 2rem;">← Volver al Inicio</button>
  </div>

  <script>
    const token = sessionStorage.getItem('token');
    if (!token) {
      alert('Debes iniciar sesión primero.');
      window.location.href = '/';
    }

    async function loadOrders() {
      try {
        const query = `
          query {
            myOrders {
              id
              total
              status
              createdAt
              products {
                name
                price
                quantity
              }
            }
          }
        `;

        const res = await fetch('/graphql', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ query })
        });

        const result = await res.json();

        if (result.errors) {
          console.error(result.errors);
          alert('Error al cargar pedidos');
          return;
        }

        const orders = result.data.myOrders;

        if (orders.length === 0) {
          document.getElementById('empty-orders').style.display = 'block';
          return;
        }

        renderOrders(orders);
      } catch (err) {
        console.error(err);
        alert('Error al cargar pedidos');
      }
    }

    function renderOrders(orders) {
      const container = document.getElementById('orders-list');
      container.innerHTML = '';

      orders.forEach(order => {
        const orderCard = document.createElement('div');
        orderCard.className = `order-card ${order.status}`;

        const statusClass = order.status === 'completed' ? 'status-completed' : 'status-pending';
        const statusText = order.status === 'completed' ? '✓ Completado' : '⏳ En Curso';
        const statusIcon = order.status === 'completed' ? '✓' : '⏳';

        const date = new Date(order.createdAt).toLocaleString('es-ES', {
          day: '2-digit',
          month: 'long',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });

        let productsHTML = '';
        order.products.forEach(p => {
          productsHTML += `
            <div class="product-item">
              <span class="product-name">${p.name} <strong>x${p.quantity}</strong></span>
              <span class="product-price">${(p.price * p.quantity).toFixed(2)} €</span>
            </div>
          `;
        });

        orderCard.innerHTML = `
          <div class="order-header">
            <span class="order-id">🧾 Pedido #${order.id.slice(-8).toUpperCase()}</span>
            <span class="order-status ${statusClass}">${statusText}</span>
          </div>
          <div class="order-info">
            <div class="info-item">
              <div class="info-label">📅 Fecha</div>
              <div class="info-value">${date}</div>
            </div>
            <div class="info-item">
              <div class="info-label">💰 Total</div>
              <div class="info-value price">${order.total.toFixed(2)} €</div>
            </div>
            <div class="info-item">
              <div class="info-label">📦 Productos</div>
              <div class="info-value">${order.products.length}</div>
            </div>
          </div>
          <div class="order-products">
            <h4>📋 Detalles del Pedido</h4>
            ${productsHTML}
          </div>
        `;

        container.appendChild(orderCard);
      });
    }

    function goBack() {
      window.location.href = '/';
    }

    function goToProducts() {
      window.location.href = '/products.html';
    }

    loadOrders();
  </script>
</body>
</html>
